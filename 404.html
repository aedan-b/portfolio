<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Signal Lost</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    :root {
      --neon-cyan:   #00f5ff;
      --neon-green:  #39ff14;
      --neon-red:    #ff2052;
      --neon-yellow: #ffe600;
      --dim-cyan:    #00a8b0;
      --space-dark:  #04060f;
      --panel-bg:    #080e1c;
      --panel-border:#1a2a4a;
      --text-main:   #c8deff;
      --scanline:    rgba(0,0,0,0.18);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--space-dark);
      color: var(--text-main);
      font-family: 'Press Start 2P', monospace;
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    canvas#stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        var(--scanline) 0px,
        var(--scanline) 1px,
        transparent 1px,
        transparent 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    .scene {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      width: 100%;
      max-width: 740px;
      padding: 0 16px;
    }

    .station-wrap {
      animation: float 5s ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform: translate(-50%,-50%) rotate(-1deg); }
      50%      { transform: translate(-50%,-50%) translateY(-12px) rotate(1deg); }
    }

    .error-code {
      font-size: clamp(48px, 12vw, 88px);
      color: var(--neon-cyan);
      text-shadow:
        0 0 6px var(--neon-cyan),
        0 0 18px var(--neon-cyan),
        0 0 40px #006fff;
      position: relative;
      letter-spacing: 6px;
      animation: glitch 4s infinite;
      margin-top: 8px;
    }
    @keyframes glitch {
      0%,90%,100% { clip-path: none; transform: none; }
      91% {
        clip-path: inset(30% 0 50% 0);
        transform: translate(-4px, 2px);
        color: var(--neon-red);
        text-shadow: 0 0 8px var(--neon-red);
      }
      93% {
        clip-path: inset(60% 0 10% 0);
        transform: translate(4px, -2px);
        color: var(--neon-cyan);
      }
      95% { clip-path: none; transform: none; }
    }

    .hud {
      background: var(--panel-bg);
      border: 2px solid var(--panel-border);
      box-shadow:
        0 0 0 1px #0d1f3c,
        inset 0 0 30px rgba(0,60,100,0.3),
        0 0 24px rgba(0,245,255,0.08);
      padding: 24px 28px 22px;
      width: 100%;
      max-width: 620px;
      margin-top: 18px;
      position: relative;
    }
    .hud::before, .hud::after {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      border-color: var(--neon-cyan);
      border-style: solid;
    }
    .hud::before { top: -2px; left: -2px; border-width: 2px 0 0 2px; }
    .hud::after  { bottom: -2px; right: -2px; border-width: 0 2px 2px 0; }

    .hud-header {
      font-size: 7px;
      color: var(--dim-cyan);
      letter-spacing: 3px;
      border-bottom: 1px solid var(--panel-border);
      padding-bottom: 10px;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
    }
    .blink { animation: blink 1.1s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    .hud-body {
      font-size: 8px;
      line-height: 2;
      color: var(--text-main);
    }
    .hud-body .label { color: var(--neon-green); }
    .hud-body .value { color: var(--neon-yellow); }
    .hud-body .err   { color: var(--neon-red); }

    .signal-bar {
      display: flex;
      gap: 4px;
      align-items: flex-end;
      margin-top: 2px;
    }
    .signal-bar span {
      display: inline-block;
      width: 8px;
      background: var(--neon-red);
      box-shadow: 0 0 6px var(--neon-red);
      animation: pulse-bar 1.4s ease-in-out infinite;
    }
    .signal-bar span:nth-child(1) { height: 6px;  animation-delay: 0s; }
    .signal-bar span:nth-child(2) { height: 10px; animation-delay: 0.2s; }
    .signal-bar span:nth-child(3) { height: 14px; animation-delay: 0.4s; background: var(--neon-yellow); box-shadow: 0 0 6px var(--neon-yellow); }
    .signal-bar span:nth-child(4) { height: 18px; animation-delay: 0.6s; opacity: 0.2; background: var(--dim-cyan); box-shadow: none; }
    .signal-bar span:nth-child(5) { height: 22px; animation-delay: 0.8s; opacity: 0.1; background: var(--dim-cyan); box-shadow: none; }
    @keyframes pulse-bar { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .terminal {
      margin-top: 16px;
      background: rgba(0,255,20,0.04);
      border: 1px solid rgba(57,255,20,0.2);
      padding: 10px 14px;
      font-size: 7px;
      color: var(--neon-green);
      letter-spacing: 1px;
      line-height: 2;
    }
    .cursor {
      display: inline-block;
      width: 8px; height: 12px;
      background: var(--neon-green);
      vertical-align: middle;
      animation: blink 0.8s step-end infinite;
      margin-left: 2px;
    }

    .btn-home {
      display: inline-block;
      margin-top: 24px;
      padding: 12px 24px;
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: var(--space-dark);
      background: var(--neon-cyan);
      border: none;
      cursor: pointer;
      text-decoration: none;
      letter-spacing: 2px;
      box-shadow: 0 0 0 3px var(--space-dark), 0 0 0 5px var(--neon-cyan), 0 0 20px var(--neon-cyan);
      transition: box-shadow 0.15s, transform 0.1s;
    }
    .btn-home:hover {
      box-shadow: 0 0 0 3px var(--space-dark), 0 0 0 5px #fff, 0 0 32px var(--neon-cyan);
      transform: translateY(-2px);
    }
    .btn-home:active { transform: translateY(1px); }

    .orbit-ring {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 200px; height: 200px;
      border-radius: 50%;
      border: 1px dashed rgba(0,245,255,0.12);
      animation: spin-ring 18s linear infinite;
      pointer-events: none;
    }
    .orbit-dot {
      position: absolute;
      width: 6px; height: 6px;
      background: var(--neon-yellow);
      border-radius: 50%;
      top: 0; left: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 8px var(--neon-yellow);
    }
    @keyframes spin-ring { to { transform: translate(-50%, -50%) rotate(360deg); } }
  </style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="scene">

  <!-- JWST + orbit ring container, sits fully above the 404 text -->
  <div style="position:relative; width:260px; height:190px; margin-bottom:12px; flex-shrink:0;">
    <div class="orbit-ring"><div class="orbit-dot"></div></div>

    <!-- James Webb Space Telescope — blocky pixel-art -->
    <div class="station-wrap" style="position:absolute;top:50%;left:50%;">
      <svg width="220" height="170" viewBox="0 0 220 170" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
        <defs>
          <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"  stop-color="#ffe680"/>
            <stop offset="50%" stop-color="#b86a00"/>
            <stop offset="100%" stop-color="#ffe680"/>
          </linearGradient>
          <filter id="gg" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="2" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="cg" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="1.5" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>

        <!-- ══ SUNSHIELD — 5 blocky parallelogram layers ══ -->
        <polygon points="50,148 170,148 188,160 32,160" fill="#060f1c" stroke="#14305a" stroke-width="2"/>
        <polygon points="54,139 166,139 183,150 37,150" fill="#081428" stroke="#1a3c6e" stroke-width="2"/>
        <polygon points="58,130 162,130 178,140 42,140" fill="#0b1a34" stroke="#204882" stroke-width="2"/>
        <polygon points="62,121 158,121 173,130 47,130" fill="#0e2040" stroke="#265496" stroke-width="2"/>
        <polygon points="66,112 154,112 168,120 52,120" fill="#112650" stroke="#2c60aa" stroke-width="2"/>

        <!-- ══ SPACECRAFT BUS — chunky block ══ -->
        <rect x="82" y="88" width="56" height="26" fill="#0e1c30" stroke="#2c60aa" stroke-width="2"/>
        <rect x="87" y="93"  width="46" height="7"  fill="#081420" stroke="#163050" stroke-width="1"/>
        <rect x="87" y="103" width="46" height="7"  fill="#081420" stroke="#163050" stroke-width="1"/>
        <!-- blinking status LED -->
        <rect x="124" y="95" width="6" height="4" fill="#39ff14" filter="url(#cg)">
          <animate attributeName="opacity" values="1;0.15;1" dur="1.3s" repeatCount="indefinite"/>
        </rect>

        <!-- ══ SECONDARY MIRROR TOWER ══ -->
        <!-- main strut — thick block -->
        <rect x="107" y="58" width="6" height="30" fill="#6688aa" stroke="#99bbdd" stroke-width="1"/>
        <!-- left brace -->
        <polygon points="98,60 107,60 107,74 98,70" fill="#4a6888" stroke="#99bbdd" stroke-width="1"/>
        <!-- right brace -->
        <polygon points="113,60 122,60 122,70 113,74" fill="#4a6888" stroke="#99bbdd" stroke-width="1"/>
        <!-- secondary mirror — flat blocky octagon -->
        <polygon points="104,44 116,44 122,50 122,58 116,64 104,64 98,58 98,50"
                 fill="url(#gold)" stroke="#ffe680" stroke-width="2" filter="url(#gg)"/>
        <rect x="105" y="48" width="10" height="12" fill="#b86a00" opacity="0.45"/>

        <!-- ══ PRIMARY MIRROR — 18 flat-top blocky hexagons ══ -->
        <!-- hex size: W=16px, H=14px. Pointy top, rows offset by 8px -->

        <!-- ROW A — 2 hexes -->
        <polygon points="86,8  94,8  98,15  94,22  86,22  82,15"  fill="url(#gold)" stroke="#ffe680" stroke-width="2" filter="url(#gg)"/>
        <polygon points="102,8 110,8 114,15 110,22 102,22  98,15" fill="url(#gold)" stroke="#ffe680" stroke-width="2" filter="url(#gg)"/>

        <!-- ROW B — 3 hexes (down 14, left 8) -->
        <polygon points="78,22  86,22  90,29  86,36  78,36  74,29"  fill="url(#gold)" stroke="#ffe680" stroke-width="2" filter="url(#gg)"/>
        <polygon points="94,22 102,22 106,29 102,36  94,36  90,29"  fill="url(#gold)" stroke="#ffe680" stroke-width="2" filter="url(#gg)"/>
        <polygon points="110,22 118,22 122,29 118,36 110,36 106,29" fill="url(#gold)" stroke="#ffe680" stroke-width="2" filter="url(#gg)"/>

        <!-- ROW C — 4 hexes -->
        <polygon points="70,36  78,36  82,43  78,50  70,50  66,43"  fill="url(#gold)" stroke="#ffe680" stroke-width="2" filter="url(#gg)"/>
        <polygon points="86,36  94,36  98,43  94,50  86,50  82,43"  fill="url(#gold)" stroke="#ffe680" stroke-width="2.5" filter="url(#gg)"/>
        <polygon points="102,36 110,36 114,43 110,50 102,50  98,43" fill="url(#gold)" stroke="#ffe680" stroke-width="2.5" filter="url(#gg)"/>
        <polygon points="118,36 126,36 130,43 126,50 118,50 114,43" fill="url(#gold)" stroke="#ffe680" stroke-width="2" filter="url(#gg)"/>

        <!-- ROW D — 3 hexes -->
        <polygon points="78,50  86,50  90,57  86,64  78,64  74,57"  fill="url(#gold)" stroke="#ffe680" stroke-width="2" filter="url(#gg)"/>
        <polygon points="94,50 102,50 106,57 102,64  94,64  90,57"  fill="url(#gold)" stroke="#ffe680" stroke-width="2" filter="url(#gg)"/>
        <polygon points="110,50 118,50 122,57 118,64 110,64 106,57" fill="url(#gold)" stroke="#ffe680" stroke-width="2" filter="url(#gg)"/>

        <!-- ROW E — 2 hexes -->
        <polygon points="86,64  94,64  98,71  94,78  86,78  82,71"  fill="url(#gold)" stroke="#ffe680" stroke-width="2" filter="url(#gg)"/>
        <polygon points="102,64 110,64 114,71 110,78 102,78  98,71" fill="url(#gold)" stroke="#ffe680" stroke-width="2" filter="url(#gg)"/>

        <!-- ══ SOLAR PANEL — right of bus ══ -->
        <rect x="138" y="90" width="4"  height="10" fill="#1a3050" stroke="#00c8ff" stroke-width="1"/>
        <rect x="142" y="88" width="40" height="14" fill="#091828" stroke="#00c8ff" stroke-width="2"/>
        <line x1="151" y1="88" x2="151" y2="102" stroke="#00c8ff" stroke-width="1" opacity="0.5"/>
        <line x1="160" y1="88" x2="160" y2="102" stroke="#00c8ff" stroke-width="1" opacity="0.5"/>
        <line x1="169" y1="88" x2="169" y2="102" stroke="#00c8ff" stroke-width="1" opacity="0.5"/>
        <line x1="178" y1="88" x2="178" y2="102" stroke="#00c8ff" stroke-width="1" opacity="0.5"/>
        <line x1="142" y1="95" x2="182" y2="95" stroke="#00c8ff" stroke-width="1" opacity="0.4"/>

        <!-- ══ HIGH-GAIN ANTENNA — left of bus ══ -->
        <!-- arm -->
        <rect x="46" y="96" width="36" height="4" fill="#4a6888" stroke="#99bbdd" stroke-width="1"/>
        <!-- dish body — blocky octagon -->
        <polygon points="30,88 42,84 50,84 54,88 54,104 50,108 42,108 30,104"
                 fill="#0e1c30" stroke="#00c8ff" stroke-width="2"/>
        <!-- dish grid lines -->
        <line x1="30" y1="96" x2="54" y2="96" stroke="#00c8ff" stroke-width="1" opacity="0.4"/>
        <line x1="42" y1="84" x2="42" y2="108" stroke="#00c8ff" stroke-width="1" opacity="0.4"/>
        <!-- feed point -->
        <rect x="39" y="93" width="6" height="6" fill="#00c8ff" opacity="0.5" filter="url(#cg)"/>
      </svg>
    </div>
  </div>

  <!-- 404 heading — sits clearly below the telescope -->
  <div class="error-code">404</div>

  <!-- HUD panel -->
  <div class="hud">
    <div class="hud-header">
      <span>JWST // NAVIGATION HUD</span>
      <span class="blink">● ALERT</span>
    </div>
    <div class="hud-body">
      <div><span class="label">STATUS  </span><span class="err">  SIGNAL LOST</span></div>
      <div><span class="label">SECTOR  </span><span class="value">  UNKNOWN</span></div>
      <div style="display:flex;align-items:center;gap:8px;">
        <span class="label">SIGNAL  </span>
        <div class="signal-bar">
          <span></span><span></span><span></span><span></span><span></span>
        </div>
      </div>
      <div style="margin-top:8px;"><span class="label">ERROR   </span><span class="err">  COORDINATES NOT FOUND</span></div>
    </div>

    <div class="terminal">
      &gt; SEARCHING FOR REQUESTED SECTOR...<br>
      &gt; SCAN COMPLETE. NO MATCHING ROUTE.<br>
      &gt; RECOMMEND RETURN TO BASE.<span class="cursor"></span>
    </div>
  </div>

  <a href="/portfolio/" class="btn-home">⬅ RETURN TO BASE</a>

</div>

<script>
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');
  let stars = [];

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    stars = Array.from({ length: 180 }, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.6 + 0.2,
      speed: Math.random() * 0.18 + 0.04,
      opacity: Math.random() * 0.7 + 0.3,
      twinkle: Math.random() * Math.PI * 2
    }));
  }

  function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      s.twinkle += 0.02;
      const op = s.opacity * (0.7 + 0.3 * Math.sin(s.twinkle));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200, 220, 255, ${op})`;
      ctx.fill();
      s.y += s.speed;
      if (s.y > canvas.height) { s.y = 0; s.x = Math.random() * canvas.width; }
    });
    requestAnimationFrame(drawStars);
  }

  window.addEventListener('resize', resize);
  resize();
  requestAnimationFrame(drawStars);
</script>
</body>
</html>
